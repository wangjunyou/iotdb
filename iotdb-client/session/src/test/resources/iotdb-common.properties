####################
### REST Service Configuration
####################

# Is the REST service enabled
enable_rest_service=true

# the binding port of the REST service
# rest_service_port=18080

# The maximum row limit for REST and Grafana query responses.
# The request rowLimit/row_limit value cannot exceed this limit.
# rest_query_default_row_size_limit=10000

# Whether to display rest service interface information through OpenAPI. eg: http://ip:port/openapi.json
# enable_swagger=false

# is SSL enabled
# enable_https=false

# SSL key store path
# key_store_path=

# SSL key store password
# key_store_pwd=

# Is client authentication required
# client_auth=false

# SSL trust store path
# trust_store_path=

# SSL trust store password.
# trust_store_pwd=

# SSL timeout (in seconds)
# idle_timeout_in_seconds=50000
